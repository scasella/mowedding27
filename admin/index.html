<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Content manager · Meghan &amp; Owen</title>
  <link rel="icon" href="data:,">
</head>
<body>
  <!-- Decap CMS — pinned version (do not float to @latest).
       Auth via DecapBridge: editors log in with email + password (or Google/
       Microsoft) — no GitHub account needed. Config is read from ./config.yml. -->
  <script src="https://unpkg.com/decap-cms@3.12.2/dist/decap-cms.js"></script>
  <script>
    // Optional polish: render the live-preview pane with the real site styles.
    (function attach(tries) {
      if (window.CMS && typeof window.CMS.registerPreviewStyle === "function") {
        try { window.CMS.registerPreviewStyle("/assets/css/site.css"); } catch (e) {}
      } else if (tries > 0) {
        setTimeout(function () { attach(tries - 1); }, 200);
      }
    })(25);
  </script>
</body>
</html>
